  ## Usage

  ```hcl
  module "runners" {
    source = "github.com/martinopedal/terraform-azurerm-github-runners-alz-corp"

    # ... your existing inputs ...
    runner_acr_push_enabled = true
  }

  resource "azurerm_subnet" "acr_agent_pool" {
    name                              = "snet-acragent"
    resource_group_name               = azurerm_virtual_network.this.resource_group_name
    virtual_network_name              = azurerm_virtual_network.this.name
    address_prefixes                  = ["10.0.3.0/24"]
    private_endpoint_network_policies = "Disabled"
  }

  module "acr_agent_pool" {
    source = "github.com/martinopedal/github-runners-alz-corp-cookbook//modules/acr-agent-pool"

    name                              = "vnetpool"
    location                          = "swedencentral"
    container_registry_resource_id    = module.runners.container_registry_resource_id
    virtual_network_subnet_resource_id = azurerm_subnet.acr_agent_pool.id
  }
  ```

  Then in your workflow (see [`patterns/acr-build.md`](../../patterns/acr-build.md) for the full GitHub Actions workflow):

  ```bash
  az acr build \
    --registry "$ACR_NAME" \
    --agent-pool "$ACR_AGENT_POOL" \
    --image "my-app:$GITHUB_SHA" \
    --file Dockerfile .
  ```

  ## Cost

  Dedicated agent pools are in **public preview** and billed per vCPU per second of instance allocation. With the default `count = 1` an S1 instance (2 vCPU) is allocated continuously. Scale-to-zero is supported by the service (`az acr agentpool update --count 0`) but is not automated by this module. Check the current rate on the [ACR pricing page](https://azure.microsoft.com/en-us/pricing/details/container-registry/) under "Dedicated agent pool billing" before committing to a tier.

  Tiers: **S1** (2 vCPU, 3 GB), **S2** (4 vCPU, 8 GB), **S3** (8 vCPU, 16 GB), **I6** isolated (64 vCPU, 216 GB).

